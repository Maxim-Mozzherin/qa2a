services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: qa2a
      POSTGRES_USER: admin  
      POSTGRES_PASSWORD: 12332145
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../migrations/init.sql:/docker-entrypoint-initdb.d/init.sql  # Правильный путь
    restart: always

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    restart: always

  app:
    build:
      context: ../  # /opt/qa2a корень проекта
      dockerfile: docker/Dockerfile
    ports:
      - "8081:8080"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=12332145
      - DB_NAME=qa2a
    depends_on:
      - postgres
    restart: always

volumes:
  pgdata:

