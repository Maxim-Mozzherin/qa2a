<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QA2A</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/css/style.css?v=6.5">
</head>
<body>
    <header><h1 onclick="openDrawer('switcher')">QA2A ▾</h1></header>

    <div id="onboarding" style="display:none; padding: 120px 20px; text-align: center;">
        <h2 style="margin-bottom: 30px;">Добро пожаловать</h2>
        <button class="btn-main" onclick="createNewBusiness()">Создать новый бизнес</button>
        <button class="btn-main" onclick="joinByCode()" style="margin-top:15px; background:var(--surface); color:var(--text); border: 1px solid var(--border);">Ввести код</button>
    </div>

    <div id="main-app" style="display:none;">
        <div class="app-container">
            <div class="hero-spacer"></div>

            <!-- ВКЛАДКА: ГЛАВНАЯ -->
            <div id="tab-home" class="tab-content">
                <div class="section">
                    <div class="section-title" id="orgName">Загрузка...</div>
                </div>
                
                <!-- ИСТОРИЯ ТЕПЕРЬ НАД КНОПКАМИ -->
                <div class="section">
                    <div class="section-title">Пульс заведения</div>
                    <div id="historyFeed"></div>
                </div>

                <div class="section">
                    <div class="actions-grid">
                        <div class="card" onclick="openDrawer('writeoff')"><span class="card-icon">📉</span><span class="card-title">Списание</span></div>
                        <div class="card" onclick="switchTab('stock')"><span class="card-icon">📦</span><span class="card-title">Остатки</span></div>
                        <div class="card" onclick="openDrawer('request')"><span class="card-icon">📝</span><span class="card-title">Заявка</span></div>
                        <div class="card" onclick="openDrawer('transfer')"><span class="card-icon">🔄</span><span class="card-title">Перенос</span></div>
                    </div>
                </div>
            </div>

            <!-- ВКЛАДКА: СКЛАД -->
            <div id="tab-stock" class="tab-content" style="display:none">
                <div class="section"><div class="section-title">Склад</div><div id="stockList"></div></div>
            </div>

            <!-- ВКЛАДКА: АДМИН -->
            <div id="tab-admin" class="tab-content" style="display:none">
                <div class="section">
                    <div class="section-title">Склады</div><div id="adminLocationList"></div>
                    <button class="btn-main" onclick="openDrawer('add_loc')">+ Склад</button>
                </div>
                <div class="section">
                    <div class="section-title">Товары</div><div id="adminPositionList"></div>
                    <button class="btn-main" onclick="openDrawer('add_pos')">+ Товар</button>
                </div>
            </div>

            <!-- ВКЛАДКА: КОМАНДА -->
            <div id="tab-team" class="tab-content" style="display:none">
                <div class="section">
                    <div class="section-title">Доступ</div>
                    <!-- ИНВАЙТ-КОД ТЕПЕРЬ СВЕРХУ -->
                    <div style="margin-bottom:20px; padding:20px; border:1px dashed var(--accent); border-radius:16px; text-align:center" onclick="copyInviteCode()">
                        <small style="color:var(--text-muted)">Нажми, чтобы скопировать код:</small>
                        <div id="displayInviteCode" style="font-size:24px; font-weight:900; letter-spacing:3px; color:var(--accent); margin-top:10px">---</div>
                    </div>
                    
                    <div class="section-title">Участники</div>
                    <div id="memberList"></div>
                </div>
            </div>
        </div>

        <nav class="nav-bar">
            <a href="javascript:void(0)" class="nav-item active" id="nav-home" onclick="switchTab('home')"><span>🏠</span>Главная</a>
            <a href="javascript:void(0)" class="nav-item" id="nav-stock" onclick="switchTab('stock')"><span>📦</span>Склад</a>
            <a href="javascript:void(0)" class="nav-item" id="nav-admin" onclick="switchTab('admin')"><span>⚙️</span>Админ</a>
            <a href="javascript:void(0)" class="nav-item" id="nav-team" onclick="switchTab('team')"><span>👥</span>Команда</a>
        </nav>
    </div>

    <div class="overlay" id="overlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="drawer_switcher"><h3>Бизнесы</h3><div id="companyList"></div><hr style="margin:15px 0; border:0; border-top:1px solid var(--border);"><button class="btn-main" onclick="joinByCode()">+ Вступить по коду</button><button class="btn-main" onclick="openDrawer('create_biz')" style="margin-top:10px; background:var(--bg); border:1px solid var(--border);">+ Создать новый</button></div>
    <div class="drawer" id="drawer_create_biz"><h3>Новый бизнес</h3><input type="text" id="new_biz_name" placeholder="Название заведения"><button class="btn-main" onclick="submitCreateBusiness()">Создать</button></div>
    <div class="drawer" id="drawer_add_pos"><h3>Товар</h3><input type="text" id="p_name" placeholder="Название"><div style="display:flex; gap:10px"><select id="p_unit"><option>шт</option><option>кг</option><option>л</option></select><input type="text" id="p_supplier" placeholder="Поставщик"></div><div class="input-group"><label>Склад и начальный остаток</label><div style="display:flex; gap:10px"><input type="number" id="p_init_qty" placeholder="0.00" style="flex:1"><select id="p_location" style="flex:1"></select></div></div><button class="btn-main" onclick="submitNewPosition()">Создать</button></div>
    <div class="drawer" id="drawer_add_loc"><h3>Новый склад</h3><input type="text" id="loc_name" placeholder="Название"><button class="btn-main" onclick="submitNewLocation()">Добавить</button></div>
    <div class="drawer" id="drawer_writeoff"><h3>Списание</h3><div class="input-group"><label>Товар</label><input type="text" id="w_search" oninput="filterSearch('w')" placeholder="Поиск..."><div id="w_results" class="search-results"></div><input type="hidden" id="w_name"></div><div style="display:flex; gap:10px"><input type="number" id="w_qty" placeholder="0.00" style="flex:2"><div id="w_unit_display" style="flex:1; padding:15px; background:var(--bg); text-align:center; border-radius:12px; font-weight:800">...</div></div><div class="input-group" style="margin-top:15px"><label>Склад</label><select id="w_location"></select></div><button class="btn-main" onclick="submitOperation('writeoff', 'w')">Сохранить</button></div>

    <script src="/static/js/app.js?v=6.5"></script>
</body>
</html>
